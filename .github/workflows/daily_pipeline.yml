name: Pipeline & Sonuç Güncelleme

on:
  schedule:
    - cron: "0 5 * * *"    # 08:00 İstanbul — sabah analiz (run-pipeline)
    - cron: "30 21 * * *"  # 00:30 İstanbul — gece sonuç güncelleme (update-scores)
    - cron: "0 23 * * *"   # 02:00 İstanbul — geç maçlar sonuç güncelleme (update-scores)
  workflow_dispatch:
    inputs:
      command:
        description: 'Çalıştırılacak komut'
        required: false
        default: 'run-pipeline'
        type: choice
        options:
          - run-pipeline
          - update-scores

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Playwright browser yükle
        run: |
          cd backend
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Komut çalıştır
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          SCHEDULE="${{ github.event.schedule }}"
          CMD="${{ github.event.inputs.command }}"

          if [ "$SCHEDULE" = "0 5 * * *" ] || [ "$CMD" = "run-pipeline" ] || ([ -z "$CMD" ] && [ -z "$SCHEDULE" ]); then
            echo "Sabah pipeline çalışıyor (run-pipeline)..."
            python -m app.cli.main run-pipeline
          else
            echo "Sonuç güncellemesi çalışıyor (update-scores)..."
            python -m app.cli.main update-scores
          fi
