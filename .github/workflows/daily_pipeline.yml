name: Günlük Pipeline

on:
  schedule:
    - cron: "0 5 * * *"  # Her sabah 05:00 UTC = 08:00 İstanbul
  workflow_dispatch:       # GitHub üzerinden el ile de tetiklenebilir

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Playwright browser yükle
        run: |
          cd backend
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Pipeline çalıştır (bugünün maçlarını çek, analiz et, DB'ye yaz)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          python -m app.cli.main run-pipeline
