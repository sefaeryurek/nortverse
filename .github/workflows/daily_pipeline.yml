name: Pipeline & Sonuç Güncelleme

# ⚠️ Sprint 8.10 — Tüm cron'lar GEÇİCİ olarak DEVRE DIŞI
# Sebep: Supabase egress aşımı (25 GB / 5 GB). Cron tetiklenirse erişim geri
# döndüğünde anında yeni egress yaratır. Egress optimize edildikten + DB
# erişimi sağlanınca aşağıdaki schedule blokunu yorum satırından çıkar.
# Bu süre boyunca workflow_dispatch ile manuel tetiklenebilir.

on:
  # schedule:
  #   - cron: "0 5 * * *"    # 08:00 İstanbul — sabah analiz (run-pipeline)
  #   - cron: "0 6 * * *"    # 09:00 İstanbul — yedek analiz (08:00 cron kaçırırsa)
  #   # Saat başı update-scores — Sprint 8.10b'de azaltılacak (12 → 3 entry)
  #   - cron: "0 11 * * *"   # 14:00 İstanbul (update-scores)
  #   - cron: "0 15 * * *"   # 18:00 İstanbul (update-scores)
  #   - cron: "0 19 * * *"   # 22:00 İstanbul (update-scores)
  #   - cron: "30 21 * * *"  # 00:30 İstanbul — gece toplu güncelleme
  #   - cron: "0 23 * * *"   # 02:00 İstanbul — geç maçlar
  workflow_dispatch:
    inputs:
      command:
        description: 'Çalıştırılacak komut'
        required: false
        default: 'run-pipeline'
        type: choice
        options:
          - run-pipeline
          - update-scores

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Playwright browser yükle
        run: |
          cd backend
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Komut çalıştır
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          SCHEDULE="${{ github.event.schedule }}"
          CMD="${{ github.event.inputs.command }}"

          if [ "$SCHEDULE" = "0 5 * * *" ] || [ "$SCHEDULE" = "0 6 * * *" ] || [ "$CMD" = "run-pipeline" ] || ([ -z "$CMD" ] && [ -z "$SCHEDULE" ]); then
            echo "Pipeline çalışıyor (run-pipeline)... [schedule=$SCHEDULE]"
            python -m app.cli.main run-pipeline
          else
            echo "Sonuç güncellemesi çalışıyor (update-scores)... [schedule=$SCHEDULE]"
            python -m app.cli.main update-scores
          fi
